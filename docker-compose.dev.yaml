services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - ./data:/opt/litethaus
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  caddy:
    profiles: ["caddy"]
    build:
      context: ./caddy
    volumes:
      - ./caddy/Caddyfile:/etc/caddyfile
    command: caddy run --config /etc/caddyfile
    ports:
      - "80:80"
      # host 443 is already bound by the real reverse proxy on this box;
      # 8443 is dev-sandbox-only, production deployments should map 443:443
      - "8443:443"
    expose:
      - "2019"
    networks:
      - default
      - litethaus

networks:
  litethaus:
    name: litethaus
