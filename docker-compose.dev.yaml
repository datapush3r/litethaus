services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - ./data:/opt/litethaus
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  caddy:
    image: caddy:latest
    volumes:
      - ./caddy/Caddyfile:/etc/caddyfile
    command: caddy run --config /etc/caddyfile
    ports:
      - "80:80"
    expose:
      - "2019"
    networks:
      - default
      - litethaus

networks:
  litethaus:
    name: litethaus
