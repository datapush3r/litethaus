services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - ./data:/opt/litethaus
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  caddy:
    image: caddy:latest
    volumes:
      - ./caddy/Caddyfile:/etc/caddyfile
    command: caddy run --config /etc/caddyfile
    expose:
      - "2019"
