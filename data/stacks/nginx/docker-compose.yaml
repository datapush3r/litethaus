# Example stack demonstrating the x-litethaus metadata block.
# litethaus reads this extension field; it is invisible to `docker compose`.
x-litethaus:
  domain: nginx.home.arpa
  icon: mdi:server
  port: 80

networks:
  litethaus:
    external: true

services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - litethaus
