# Example stack demonstrating the x-litethaus metadata block.
# litethaus reads this extension field; it is invisible to `docker compose`.
x-litethaus:
  domain: example.home.arpa
  icon: mdi:server
  port: 80

networks:
  litethaus:
    external: true

services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    networks:
      - litethaus
